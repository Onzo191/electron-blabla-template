name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
          - os: windows-latest
            script: build:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # No signing identity is configured yet — this only proves the
      # packaging step works on each OS and produces unsigned artifacts.
      - run: pnpm --filter desktop run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
