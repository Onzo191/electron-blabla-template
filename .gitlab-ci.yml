# Self-hosted GitLab CI/CD. Mirrors .github/workflows/{check,build}.yml —
# remove those once this pipeline is verified end to end (see
# docs/release-cicd.md). `release` is stubbed until runners/certs/store
# accounts are provisioned; its jobs are `when: manual` and will fail
# fast with a clear message until then.

stages:
  - check
  - build
  - release

variables:
  PNPM_CACHE_DIR: "$CI_PROJECT_DIR/.pnpm-store"

.pnpm-node:
  before_script:
    - corepack enable
    - pnpm config set store-dir "$PNPM_CACHE_DIR"
    - pnpm install --frozen-lockfile
  cache:
    key: pnpm-lock-$CI_COMMIT_REF_SLUG
    paths:
      - $PNPM_CACHE_DIR

check:
  stage: check
  image: node:24
  extends: .pnpm-node
  script:
    - pnpm check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# --- build: unsigned smoke packaging on every push/MR, proves the app
# still packages on both OSes. No secrets required. ---

build:mac:
  stage: build
  tags: [macos] # TODO: register a self-hosted macOS runner with this tag
  extends: .pnpm-node
  variables:
    CSC_IDENTITY_AUTO_DISCOVERY: "false"
  script:
    - pnpm --filter desktop run build:mac
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

build:win:
  stage: build
  tags: [windows] # TODO: register a self-hosted Windows runner with this tag
  extends: .pnpm-node
  variables:
    CSC_IDENTITY_AUTO_DISCOVERY: "false"
  script:
    - pnpm --filter desktop run build:win
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# --- release: real signing + notarization + (for direct) update-feed
# publish. Tag-gated (vX.Y.Z on main) so a routine push never accidentally
# ships a release. Store jobs are manual on top of that — App Store /
# Microsoft Store submission needs a human in the respective console
# anyway. See docs/release-cicd.md Sections 3-7 for the secrets each of
# these needs (Secure Files + protected CI/CD variables). ---

release:mac-direct:
  stage: release
  tags: [macos]
  extends: .pnpm-node
  script:
    - echo "TODO — provision Apple Developer ID cert + notarization API key, then run pnpm --filter desktop run build:mac"
    - exit 1
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual

release:mac-mas:
  stage: release
  tags: [macos]
  extends: .pnpm-node
  script:
    - echo "TODO — provision Apple Distribution cert + provisioning profile, then run pnpm --filter desktop run build:mac:mas"
    - exit 1
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual

release:win-direct:
  stage: release
  tags: [windows]
  extends: .pnpm-node
  script:
    - echo "TODO — provision a non-US-eligible cloud signing cert (SSL.com eSigner / DigiCert KeyLocker), then run pnpm --filter desktop run build:win"
    - exit 1
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual

release:win-store:
  stage: release
  tags: [windows]
  extends: .pnpm-node
  script:
    - echo "TODO — reserve the app identity in Microsoft Partner Center, then run pnpm --filter desktop run build:win:store"
    - exit 1
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual

release:publish-update-feed:
  stage: release
  tags: [macos] # needs release:mac-direct's + release:win-direct's artifacts
  needs: ["release:mac-direct", "release:win-direct"]
  script:
    - echo "TODO — upload dmg/zip/nsis + latest.yml/latest-mac.yml + update-policy.json to updates.internal.vng.com.vn (docs/release-cicd.md Section 5)"
    - exit 1
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual

# --- emergency: flip the forced-update policy (minSupportedVersion /
# forceUpdate) WITHOUT building or signing anything. No code-signing certs
# touch this job — it only needs an API token for the release/policy
# endpoint (docs/release-cicd.md Section 5.2). Deliberately decoupled from
# push/tag pipelines: `if: $CI_PIPELINE_SOURCE == "web"` means it only
# shows up when someone manually starts a pipeline from
# CI/CD > Pipelines > "Run pipeline" in the GitLab UI, where
# MIN_SUPPORTED_VERSION / FORCE_UPDATE are filled in as pipeline
# variables — a routine `git push` never touches this job. This is the
# closest GitLab gets to "a separate pipeline" without maintaining a
# second CI config file. ---

update-policy:
  stage: release
  image: alpine:3.20
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  before_script:
    - apk add --no-cache curl
  script:
    - |
      if [ -z "$MIN_SUPPORTED_VERSION" ]; then
        echo "Set MIN_SUPPORTED_VERSION as a pipeline variable when running this job (CI/CD > Pipelines > Run pipeline)."
        exit 1
      fi
    - >
      curl -sf -X POST "$RELEASE_POLICY_API_URL"
      -H "Authorization: Bearer $RELEASE_API_TOKEN"
      -H "Content-Type: application/json"
      -d "{\"minSupportedVersion\":\"${MIN_SUPPORTED_VERSION}\",\"forceUpdate\":${FORCE_UPDATE:-false}}"
